<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .app-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Summary Cards */
        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .summary-card.total {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .summary-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .summary-amount {
            font-size: 32px;
            font-weight: bold;
        }

        /* Add Expense Form */
        .add-expense {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Expenses List */
        .expenses-list {
            margin-top: 20px;
        }

        .expense-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .expense-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .expense-info {
            flex: 1;
        }

        .expense-description {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .expense-category {
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
        }

        .expense-amount {
            font-size: 18px;
            font-weight: bold;
            color: #f5576c;
            margin-right: 15px;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff3838;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Filter */
        .filter-section {
            margin-bottom: 20px;
        }

        .filter-select {
            width: auto;
            display: inline-block;
            margin-left: 10px;
            padding: 8px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-card {
                padding: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .summary-amount {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <h1>💰 Expense Tracker</h1>
            <div class="subtitle">Track your spending, save more money</div>

            <!-- Summary Cards -->
            <div class="summary">
                <div class="summary-card">
                    <div class="summary-label">Total Expenses</div>
                    <div class="summary-amount" id="totalExpenses">$0</div>
                </div>
                <div class="summary-card total">
                    <div class="summary-label">Highest Expense</div>
                    <div class="summary-amount" id="highestExpense">$0</div>
                </div>
            </div>

            <!-- Add Expense Form -->
            <div class="add-expense">
                <h3 style="margin-bottom: 15px; color: #333;">Add New Expense</h3>
                <div class="form-group">
                    <input type="text" id="description" placeholder="Description (e.g., Coffee, Lunch, Movie)" autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <input type="number" id="amount" placeholder="Amount" step="0.01">
                    </div>
                    <div class="form-group">
                        <select id="category">
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Bills">💡 Bills</option>
                            <option value="Other">📦 Other</option>
                        </select>
                    </div>
                </div>
                <button class="btn" onclick="addExpense()">Add Expense</button>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <label style="color: #666;">Filter by category:</label>
                <select id="categoryFilter" onchange="filterExpenses()" class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Other">📦 Other</option>
                </select>
            </div>

            <!-- Expenses List -->
            <div class="expenses-list" id="expensesList">
                <div class="empty-state">No expenses yet. Add your first expense above! 🎉</div>
            </div>
        </div>
    </div>

    <script>
        // Load expenses from localStorage
        let expenses = [];

        // Load data when page loads
        loadExpenses();
        updateUI();

        function loadExpenses() {
            const saved = localStorage.getItem('expenses');
            if (saved) {
                expenses = JSON.parse(saved);
            }
        }

        function saveExpenses() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        function addExpense() {
            const descriptionInput = document.getElementById('description');
            const amountInput = document.getElementById('amount');
            const categorySelect = document.getElementById('category');
            
            const description = descriptionInput.value.trim();
            const amount = parseFloat(amountInput.value);
            const category = categorySelect.value;
            
            // Validation
            if (!description) {
                alert('Please enter a description');
                return;
            }
            
            if (isNaN(amount) || amount <= 0) {
                alert('Please enter a valid amount (greater than 0)');
                return;
            }
            
            // Create new expense
            const expense = {
                id: Date.now(),
                description: description,
                amount: amount,
                category: category,
                date: new Date().toLocaleDateString()
            };
            
            expenses.push(expense);
            saveExpenses();
            
            // Clear form
            descriptionInput.value = '';
            amountInput.value = '';
            
            // Update UI
            updateUI();
            
            // Show success message
            showTemporaryMessage('Expense added! ✅');
        }
        
        function deleteExpense(id) {
            if (confirm('Are you sure you want to delete this expense?')) {
                expenses = expenses.filter(expense => expense.id !== id);
                saveExpenses();
                updateUI();
                showTemporaryMessage('Expense deleted! 🗑️');
            }
        }
        
        function updateUI() {
            updateSummary();
            renderExpensesList();
        }
        
        function updateSummary() {
            // Calculate total
            const total = expenses.reduce((sum, expense) => sum + expense.amount, 0);
            document.getElementById('totalExpenses').textContent = `$${total.toFixed(2)}`;
            
            // Calculate highest expense
            if (expenses.length > 0) {
                const highest = Math.max(...expenses.map(e => e.amount));
                document.getElementById('highestExpense').textContent = `$${highest.toFixed(2)}`;
            } else {
                document.getElementById('highestExpense').textContent = '$0';
            }
        }
        
        function filterExpenses() {
            renderExpensesList();
        }
        
        function renderExpensesList() {
            const filterCategory = document.getElementById('categoryFilter').value;
            let filteredExpenses = expenses;
            
            if (filterCategory !== 'all') {
                filteredExpenses = expenses.filter(expense => expense.category === filterCategory);
            }
            
            // Sort by newest first
            filteredExpenses.sort((a, b) => b.id - a.id);
            
            const expensesListDiv = document.getElementById('expensesList');
            
            if (filteredExpenses.length === 0) {
                expensesListDiv.innerHTML = '<div class="empty-state">No expenses found. Add some expenses! 💰</div>';
                return;
            }
            
            expensesListDiv.innerHTML = filteredExpenses.map(expense => `
                <div class="expense-item">
                    <div class="expense-info">
                        <div class="expense-description">${escapeHtml(expense.description)}</div>
                        <div class="expense-category">${getCategoryIcon(expense.category)} ${expense.category} • ${expense.date}</div>
                    </div>
                    <div class="expense-amount">$${expense.amount.toFixed(2)}</div>
                    <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete</button>
                </div>
            `).join('');
        }
        
        function getCategoryIcon(category) {
            const icons = {
                'Food': '🍔',
                'Transport': '🚗',
                'Shopping': '🛍️',
                'Entertainment': '🎬',
                'Bills': '💡',
                'Other': '📦'
            };
            return icons[category] || '📦';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showTemporaryMessage(message) {
            // Create temporary message element
            const msgDiv = document.createElement('div');
            msgDiv.textContent = message;
            msgDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #4caf50;
                color: white;
                padding: 12px 20px;
                border-radius: 10px;
                font-weight: 500;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            
            document.body.appendChild(msgDiv);
            
            setTimeout(() => {
                msgDiv.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(msgDiv);
                }, 300);
            }, 2000);
        }
        
        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Allow Enter key to add expense
        document.getElementById('amount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addExpense();
            }
        });
        
        document.getElementById('description').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('amount').focus();
            }
        });
    </script>
</body>
</html>
